<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDX Financial Statement Parser</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center p-6">
  <div class="w-full max-w-xl">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4 shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">IDX Statement Parser</h1>
      <p class="text-slate-400 mt-2">Ekstrak laporan keuangan IDX dari PDF ke tabel terstruktur</p>
    </div>

    {% if error %}
    <div class="bg-red-500/20 border border-red-500/50 text-red-300 rounded-xl px-4 py-3 mb-6 text-sm flex items-center gap-2">
      <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form id="uploadForm" action="/extract" method="POST" enctype="multipart/form-data">
      <div id="dropzone"
        class="relative border-2 border-dashed border-slate-600 rounded-2xl p-10 text-center cursor-pointer
               hover:border-indigo-500 hover:bg-indigo-500/5 transition-all duration-200 group">
        <input id="fileInput" name="pdf" type="file" accept=".pdf"
          class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required />

        <div id="dropContent">
          <svg class="w-12 h-12 text-slate-500 group-hover:text-indigo-400 mx-auto mb-4 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
          </svg>
          <p class="text-slate-300 text-lg font-medium">Drag & drop file PDF</p>
          <p class="text-slate-500 text-sm mt-1">atau klik untuk memilih file</p>
          <p class="text-slate-600 text-xs mt-3">Maks. 50 MB · Format: .pdf</p>
        </div>

        <div id="fileSelected" class="hidden">
          <svg class="w-12 h-12 text-indigo-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <p id="fileName" class="text-indigo-300 font-medium text-lg"></p>
          <p class="text-slate-500 text-sm mt-1">File siap diproses</p>
        </div>
      </div>

      <label class="mt-4 flex items-center gap-3 text-slate-300 text-sm">
        <input type="checkbox" name="use_ocr" class="h-4 w-4 rounded border-slate-600 bg-slate-800 text-indigo-600 focus:ring-indigo-500" {% if use_ocr %}checked{% endif %} />
        Gunakan OCR fallback (untuk PDF scan/gambar)
      </label>

      <button id="submitBtn" type="submit"
        class="mt-5 w-full py-3 px-6 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700
               text-white font-semibold rounded-xl transition-all duration-150 flex items-center justify-center gap-2 shadow-lg">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
        Ekstrak Laporan
      </button>
    </form>
  </div>

  <script>
    const input = document.getElementById('fileInput');
    const dropContent = document.getElementById('dropContent');
    const fileSelected = document.getElementById('fileSelected');
    const fileName = document.getElementById('fileName');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('uploadForm');

    input.addEventListener('change', () => {
      if (input.files.length > 0) {
        dropContent.classList.add('hidden');
        fileSelected.classList.remove('hidden');
        fileName.textContent = input.files[0].name;
      }
    });

    form.addEventListener('submit', () => {
      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        Memproses...`;
    });
  </script>
</body>
</html>
